  <text x="531" y="315" fill="#115E59" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">2. Match records</text>
  <text x="810" y="315" fill="#115E59" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">3. Export results</text>

  <text x="238" y="372" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18">Excel A</text>
  <text x="238" y="406" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">Sheets, headers and</text>
  <text x="238" y="431" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">search columns are</text>
  <text x="238" y="456" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">configured explicitly.</text>

  <text x="510" y="372" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18">Indexed engine</text>
  <text x="510" y="406" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">Exact, compact and</text>
  <text x="510" y="431" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">slash variations resolve</text>
  <text x="510" y="456" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">common code formats.</text>

  <text x="782" y="372" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18">Auditable output</text>
  <text x="782" y="406" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">A fresh workbook is</text>
  <text x="782" y="431" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">generated for review</text>
  <text x="782" y="456" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">and operational reuse.</text>

