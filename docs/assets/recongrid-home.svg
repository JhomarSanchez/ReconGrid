<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" rx="28" fill="#F8FAFC"/>
  <rect x="160" y="96" width="880" height="500" rx="24" fill="#FFFFFF" stroke="#E2E8F0"/>
  <rect x="220" y="154" width="72" height="72" rx="18" fill="#0F766E"/>
  <text x="244" y="199" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#ECFEFF">RG</text>
  <text x="318" y="183" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="5" fill="#020617">RECONGRID</text>
  <text x="320" y="213" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Reconciliacion y comparacion de hojas de calculo</text>
  <text x="312" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#020617">Selecciona un flujo de trabajo</text>
  <text x="308" y="327" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">ReconGrid se concentra en conciliacion tabular y comparacion sobre Excel.</text>
  <rect x="240" y="386" width="330" height="150" rx="16" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/>
  <rect x="630" y="386" width="330" height="150" rx="16" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/>
  <text x="385" y="435" font-family="Segoe UI, Arial, sans-serif" font-size="44" fill="#0F766E">==</text>
  <text x="728" y="435" font-family="Segoe UI, Arial, sans-serif" font-size="44" fill="#0F766E">||</text>
  <text x="328" y="477" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#020617">Comparar archivos</text>
  <text x="675" y="477" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#020617">Comparar columnas internas</text>
  <text x="296" y="512" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">Cruza dos libros de Excel y genera resultados auditables.</text>
  <text x="664" y="512" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">Evalua coincidencias dentro de una misma hoja.</text>
  <circle cx="1030" cy="565" r="34" fill="#0F766E"/>
  <text x="1019" y="575" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#ECFEFF">?</text>
  <defs>
    <filter id="shadow" x="230" y="376" width="760" height="180" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>
</svg>