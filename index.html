<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Osiris - Cargar Archivos</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      :root {
        --bs-primary: #6c757d;
        --bs-primary-rgb: 108, 117, 125;
      }
      .file-selected {
        color: #28a745;
        font-weight: 500;
      }
    </style>
  </head>
  <body class="bg-light">
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div class="card shadow" style="min-width: 500px">
        <div class="card-body">
          <div class="text-center mb-3">
            <img
              src="presentation/assets/icon.png"
              alt="Icono de la app"
              style="width: 80px; height: 80px"
            />
          </div>
          <h3 class="card-title text-center text-dark mb-2">
            Cargar Archivos Excel
          </h3>
          <p class="card-text mb-4">
            Selecciona dos archivos de Excel para procesar.
          </p>

          <div class="mb-3">
            <label class="form-label">Primer Archivo Excel</label>
            <div class="d-flex gap-2">
              <button
                type="button"
                class="btn btn-outline-secondary flex-grow-1"
                id="selectFile1Btn"
              >
                Seleccionar Archivo
              </button>
            </div>
            <small class="text-muted" id="file1Path"
              >Ningún archivo seleccionado</small
            >
          </div>

          <div class="mb-4">
            <label class="form-label">Segundo Archivo Excel</label>
            <div class="d-flex gap-2">
              <button
                type="button"
                class="btn btn-outline-secondary flex-grow-1"
                id="selectFile2Btn"
              >
                Seleccionar Archivo
              </button>
            </div>
            <small class="text-muted" id="file2Path"
              >Ningún archivo seleccionado</small
            >
          </div>

          <button
            type="button"
            class="btn btn-primary w-100"
            id="processBtn"
            disabled
          >
            Cargar Archivos
          </button>

          <!-- Mostrar tiempo de carga -->
          <div
            id="loadTimeDisplay"
            class="alert alert-success mt-3"
            style="display: none"
          >
            <strong>⏱️ Archivos cargados en:</strong>
            <span id="loadTimeValue">0</span> segundos
          </div>

          <!-- Botón para volver -->
          <button
            type="button"
            class="btn btn-link w-100 mt-2"
            id="backBtn"
          >
            ← Volver a selección de modo
          </button>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <!-- Script principal -->
    <script>
      const { ipcRenderer } = require("electron");

      let file1Path = null;
      let file2Path = null;

      document.addEventListener("DOMContentLoaded", () => {
        const selectFile1Btn = document.getElementById("selectFile1Btn");
        const selectFile2Btn = document.getElementById("selectFile2Btn");
        const processBtn = document.getElementById("processBtn");
        const backBtn = document.getElementById("backBtn");
        const file1PathDisplay = document.getElementById("file1Path");
        const file2PathDisplay = document.getElementById("file2Path");

        // Botón para volver
        backBtn.addEventListener("click", () => {
          ipcRenderer.send("navigate-to", "mode-selection");
        });

        // Seleccionar primer archivo
        selectFile1Btn.addEventListener("click", async () => {
          const result = await ipcRenderer.invoke("select-excel-file");
          if (result.success && result.filePath) {
            file1Path = result.filePath;
            file1PathDisplay.textContent = result.fileName;
            file1PathDisplay.className = "text-muted file-selected";
            checkBothFilesSelected();
          }
        });

        // Seleccionar segundo archivo
        selectFile2Btn.addEventListener("click", async () => {
          const result = await ipcRenderer.invoke("select-excel-file");
          if (result.success && result.filePath) {
            file2Path = result.filePath;
            file2PathDisplay.textContent = result.fileName;
            file2PathDisplay.className = "text-muted file-selected";
            checkBothFilesSelected();
          }
        });

        // Procesar archivos
        // En el event listener del processBtn
        processBtn.addEventListener("click", async () => {
          if (!file1Path || !file2Path) {
            alert("Por favor selecciona ambos archivos Excel.");
            return;
          }

          try {
            processBtn.disabled = true;
            processBtn.innerHTML =
              '<span class="spinner-border spinner-border-sm me-2"></span>Cargando archivos grandes...';

            const result = await ipcRenderer.invoke("load-excel-files", {
              file1Path: file1Path,
              file2Path: file2Path,
            });

            if (result.success) {
              // Mostrar tiempo de carga
              if (result.loadTime) {
                const loadTimeDisplay =
                  document.getElementById("loadTimeDisplay");
                const loadTimeValue = document.getElementById("loadTimeValue");
                loadTimeValue.textContent = result.loadTime;
                loadTimeDisplay.style.display = "block";

                // Esperar 2 segundos para que el usuario vea el tiempo
                await new Promise((resolve) => setTimeout(resolve, 2000));
              }

              ipcRenderer.send("navigate-to", "config-excel1");
            } else {
              alert("Error al cargar archivos:\n\n" + result.error);
              processBtn.disabled = false;
              processBtn.textContent = "Cargar Archivos";
            }
          } catch (error) {
            console.error("Error completo:", error);
            alert("Error: " + error.message);
            processBtn.disabled = false;
            processBtn.textContent = "Cargar Archivos";
          }
        });

        function checkBothFilesSelected() {
          if (file1Path && file2Path) {
            processBtn.disabled = false;
          }
        }
      });
    </script>
  </body>
</html>
