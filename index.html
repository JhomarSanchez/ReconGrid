<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReconGrid - Comparacion entre archivos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      :root {
        --bs-primary: #0f766e;
        --bs-primary-rgb: 15, 118, 110;
        --rg-ink: #0f172a;
        --rg-muted: #475569;
      }
      .file-selected {
        color: #28a745;
        font-weight: 500;
      }
      .brand-lockup {
        display: inline-flex;
        align-items: center;
        gap: 0.9rem;
        margin-bottom: 1rem;
      }
      .brand-mark {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: linear-gradient(135deg, #0f766e, #164e63);
        color: #f8fafc;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        letter-spacing: 0.08em;
      }
      .brand-copy {
        text-align: left;
      }
      .brand-name {
        margin: 0;
        color: var(--rg-ink);
        font-size: 1.2rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .brand-tagline {
        margin: 0;
        color: var(--rg-muted);
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body class="bg-light">
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div class="card shadow" style="min-width: 500px">
        <div class="card-body">
          <div class="text-center mb-3">
            <div class="brand-lockup">
              <div class="brand-mark" aria-hidden="true">RG</div>
              <div class="brand-copy">
                <p class="brand-name">ReconGrid</p>
                <p class="brand-tagline">Reconciliacion y analisis sobre Excel</p>
              </div>
            </div>
          </div>
          <h3 class="card-title text-center text-dark mb-2">
            Comparacion entre archivos
          </h3>
          <p class="card-text mb-4">
            Selecciona dos libros de Excel para iniciar un cruce auditable.
          </p>

          <div class="mb-3">
            <label class="form-label">Archivo base</label>
            <div class="d-flex gap-2">
              <button
                type="button"
                class="btn btn-outline-secondary flex-grow-1"
                id="selectFile1Btn"
              >
                Seleccionar archivo
              </button>
            </div>
            <small class="text-muted" id="file1Path"
              >Ningun archivo seleccionado</small
            >
          </div>

          <div class="mb-4">
            <label class="form-label">Archivo de contraste</label>
            <div class="d-flex gap-2">
              <button
                type="button"
                class="btn btn-outline-secondary flex-grow-1"
                id="selectFile2Btn"
              >
                Seleccionar archivo
              </button>
            </div>
            <small class="text-muted" id="file2Path"
              >Ningun archivo seleccionado</small
            >
          </div>

          <button
            type="button"
            class="btn btn-primary w-100"
            id="processBtn"
            disabled
          >
            Continuar
          </button>

          <div
            id="loadTimeDisplay"
            class="alert alert-success mt-3"
            style="display: none"
          >
            <strong>Archivos cargados en:</strong>
            <span id="loadTimeValue">0</span> segundos
          </div>

          <button
            type="button"
            class="btn btn-link w-100 mt-2"
            id="backBtn"
          >
            Volver al inicio
          </button>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <script>
      const { ipcRenderer } = require("electron");

      let file1Path = null;
      let file2Path = null;

      document.addEventListener("DOMContentLoaded", () => {
        const selectFile1Btn = document.getElementById("selectFile1Btn");
        const selectFile2Btn = document.getElementById("selectFile2Btn");
        const processBtn = document.getElementById("processBtn");
        const backBtn = document.getElementById("backBtn");
        const file1PathDisplay = document.getElementById("file1Path");
        const file2PathDisplay = document.getElementById("file2Path");

        backBtn.addEventListener("click", () => {
          ipcRenderer.send("navigate-to", "mode-selection");
        });

        selectFile1Btn.addEventListener("click", async () => {
          const result = await ipcRenderer.invoke("select-excel-file");
          if (result.success && result.filePath) {
            file1Path = result.filePath;
            file1PathDisplay.textContent = result.fileName;
            file1PathDisplay.className = "text-muted file-selected";
            checkBothFilesSelected();
          }
        });

        selectFile2Btn.addEventListener("click", async () => {
          const result = await ipcRenderer.invoke("select-excel-file");
          if (result.success && result.filePath) {
            file2Path = result.filePath;
            file2PathDisplay.textContent = result.fileName;
            file2PathDisplay.className = "text-muted file-selected";
            checkBothFilesSelected();
          }
        });

        processBtn.addEventListener("click", async () => {
          if (!file1Path || !file2Path) {
            alert("Por favor selecciona ambos archivos Excel.");
            return;
          }

          try {
            processBtn.disabled = true;
            processBtn.innerHTML =
              '<span class="spinner-border spinner-border-sm me-2"></span>Cargando archivos...';

            const result = await ipcRenderer.invoke("load-excel-files", {
              file1Path,
              file2Path,
            });

            if (result.success) {
              if (result.loadTime) {
                const loadTimeDisplay =
                  document.getElementById("loadTimeDisplay");
                const loadTimeValue = document.getElementById("loadTimeValue");
                loadTimeValue.textContent = result.loadTime;
                loadTimeDisplay.style.display = "block";

                await new Promise((resolve) => setTimeout(resolve, 2000));
              }

              ipcRenderer.send("navigate-to", "config-excel1");
            } else {
              alert("Error al cargar archivos:\n\n" + result.error);
              processBtn.disabled = false;
              processBtn.textContent = "Continuar";
            }
          } catch (error) {
            console.error("Error completo:", error);
            alert("Error: " + error.message);
            processBtn.disabled = false;
            processBtn.textContent = "Continuar";
          }
        });

        function checkBothFilesSelected() {
          if (file1Path && file2Path) {
            processBtn.disabled = false;
          }
        }
      });
    </script>
  </body>
</html>
