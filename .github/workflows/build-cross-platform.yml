name: Build ReconGrid

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            os: macos-14
            build_command: npm run dist:mac
            artifact_name: ReconGrid-macOS-AppleSilicon
            artifact_glob: alter-osiris/dist/*.pkg
          - label: Windows x64
            os: windows-latest
            build_command: npm run dist:win
            artifact_name: ReconGrid-Windows-x64
            artifact_glob: alter-osiris/dist/*.exe
          - label: Linux x64
            os: ubuntu-latest
            build_command: npm run dist:linux
            artifact_name: ReconGrid-Linux-x64
            artifact_glob: alter-osiris/dist/*.AppImage

    defaults:
      run:
        working-directory: alter-osiris

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: alter-osiris/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build artifacts
        run: ${{ matrix.build_command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.artifact_glob }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
