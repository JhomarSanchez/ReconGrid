name: Build Mac Apple Silicon

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-14 # macos-14 usa Apple Silicon (M1) nativamente

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for Mac (Apple Silicon - ARM64)
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build artifacts
        run: ls -la dist/

      - name: Upload Mac PKG (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: Osiris-Mac-AppleSilicon-Installer
          path: dist/*.pkg
          if-no-files-found: error

      # Release automático cuando se crea un tag
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
