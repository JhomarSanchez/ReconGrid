<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReconGrid - Procesamiento</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      :root {
        --bs-primary: #0f766e;
      }
      .processing-container {
        min-height: 400px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .progress {
        width: 100%;
        max-width: 500px;
      }
      .result-summary {
        display: none;
      }
      .result-summary.show {
        display: block;
      }
      .brand-label {
        display: inline-block;
        margin-bottom: 0.75rem;
        padding: 0.35rem 0.8rem;
        border-radius: 999px;
        background: #ccfbf1;
        color: #115e59;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <div class="row">
        <div class="col-12">
          <div class="card shadow">
            <div class="card-body">
              <div class="text-center">
                <div class="brand-label">ReconGrid</div>
              </div>
              <h2 class="card-title text-primary mb-4 text-center">
                Procesando archivos
              </h2>

              <div class="processing-container" id="processingContainer">
                <div
                  class="spinner-border text-primary mb-4"
                  role="status"
                  id="spinner"
                >
                  <span class="visually-hidden">Cargando...</span>
                </div>
                <p class="text-muted mb-4" id="statusText">
                  Comparando archivos...
                </p>
                <div class="progress mb-3">
                  <div
                    class="progress-bar progress-bar-striped progress-bar-animated"
                    role="progressbar"
                    id="progressBar"
                    style="width: 0%"
                    aria-valuenow="0"
                    aria-valuemin="0"
                    aria-valuemax="100"
                  >
                    0%
                  </div>
                </div>
                <p class="small text-muted" id="progressText">
                  Procesadas 0 de 0 filas
                </p>
              </div>

              <div class="result-summary" id="resultSummary">
                <div class="alert alert-success" role="alert">
                  <h5 class="alert-heading">Proceso completado</h5>
                  <hr />
                  <div class="row">
                    <div class="col-md-6 mb-3">
                      <strong>Coincidencias exactas:</strong>
                      <p class="mb-0 fs-5" id="exactMatchesCount">0</p>
                    </div>
                    <div class="col-md-6 mb-3">
                      <strong>Sin coincidencia:</strong>
                      <p class="mb-0 fs-5" id="noMatchesCount">0</p>
                    </div>
                  </div>
                  <hr />
                  <p class="mb-0">
                    Archivo guardado en: <strong id="outputPath"></strong>
                  </p>
                </div>

                <div class="d-flex justify-content-between mt-4">
                  <button class="btn btn-secondary" id="newProcessBtn">
                    Nuevo proceso
                  </button>
                  <button class="btn btn-primary" id="openFileBtn">
                    Abrir archivo
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="../scripts/processing.js"></script>
  </body>
</html>
