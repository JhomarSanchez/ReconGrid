<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configuración Excel 2 - Osiris</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      :root {
        --bs-primary: #6c757d;
        --bs-primary-rgb: 108, 117, 125;
      }
      .preview-table {
        font-size: 0.85rem;
        max-height: 200px;
        overflow-y: auto;
      }
      .column-selector {
        max-height: 300px;
        overflow-y: auto;
        border: 1px solid #dee2e6;
        border-radius: 0.375rem;
        padding: 1rem;
      }
      .column-item {
        padding: 0.5rem;
        border-bottom: 1px solid #e9ecef;
      }
      .column-item:last-child {
        border-bottom: none;
      }
      .step-indicator {
        display: flex;
        justify-content: center;
        margin-bottom: 2rem;
      }
      .step {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        margin: 0 10px;
        color: #666;
      }
      .step.active {
        background: var(--bs-primary);
        color: white;
      }
      .step.completed {
        background: #28a745;
        color: white;
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container my-5">
      <!-- Encabezado -->
      <div class="text-center mb-4">
        <h2 class="text-dark">Configuración del Segundo Excel</h2>
        <p class="text-muted">Archivo: <strong id="fileName"></strong></p>
      </div>

      <!-- Indicador de pasos -->
      <div class="step-indicator">
        <div class="step completed" id="step1">1</div>
        <div class="step active" id="step2">2</div>
      </div>

      <!-- Card principal -->
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <!-- Sección: Configuración de hoja y columnas -->
          <div class="mb-4">
            <h5 class="mb-3">📊 Configuración de Hoja y Columnas</h5>

            <!-- Selección de hoja -->
            <div class="mb-4">
              <label for="sheetSelect" class="form-label"
                >Seleccionar Hoja:</label
              >
              <select class="form-select" id="sheetSelect">
                <option value="">Seleccione una hoja...</option>
              </select>
            </div>

            <!-- Selección de fila de encabezados -->
            <div class="mb-4">
              <label for="headerRowSelect" class="form-label">
                Fila de Encabezados:
              </label>
              <select class="form-select" id="headerRowSelect">
                <option value="1">Fila 1</option>
                <option value="2">Fila 2</option>
                <option value="3">Fila 3</option>
                <option value="4">Fila 4</option>
                <option value="5">Fila 5</option>
              </select>
            </div>

            <!-- Vista previa -->
            <div class="mb-4">
              <h6>Vista Previa</h6>
              <div class="table-responsive preview-table">
                <table class="table table-sm table-bordered" id="previewTable">
                  <thead>
                    <tr id="previewHeader"></tr>
                  </thead>
                  <tbody id="previewBody"></tbody>
                </table>
              </div>
            </div>

            <!-- Selección de columnas de búsqueda -->
            <div class="mb-4">
              <h6>Columnas de Búsqueda</h6>
              <p class="text-muted small">
                Seleccione las columnas donde se encuentran los códigos a
                comparar
              </p>
              <div class="column-selector" id="searchColumnsContainer">
                <!-- Se llenará dinámicamente -->
              </div>
            </div>

            <!-- Selección de columnas de datos -->
            <div class="mb-4">
              <div
                class="d-flex justify-content-between align-items-center mb-2"
              >
                <h6 class="mb-0">Columnas de Datos a Incluir</h6>
                <button
                  class="btn btn-sm btn-outline-primary"
                  id="selectAllDataBtn"
                >
                  Seleccionar Todas
                </button>
              </div>
              <p class="text-muted small">
                Seleccione las columnas que desea incluir en el resultado final
              </p>
              <div class="column-selector" id="dataColumnsContainer">
                <!-- Se llenará dinámicamente -->
              </div>
            </div>

            <!-- Botones de navegación -->
            <div class="d-flex justify-content-between mt-4">
              <button class="btn btn-secondary" id="backBtn">← Volver</button>
              <button class="btn btn-success" id="processBtn">
                Iniciar Procesamiento →
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Botón volver al inicio -->
      <div class="text-center mt-4">
        <button class="btn btn-outline-secondary" id="backToMenuBtn">
          ← Volver al Menú Principal
        </button>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="../scripts/config-excel2.js"></script>
  </body>
</html>
